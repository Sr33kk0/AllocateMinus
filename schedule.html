<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Event - AllocateMinus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen text-slate-800 font-sans antialiased selection:bg-indigo-200 flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass-panel rounded-2xl shadow-xl shadow-indigo-100/50 p-6 sm:p-8 animate-fade-in-down">

        <div class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center">
                <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                Schedule Event
            </h1>
            <a href="/" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors">Back</a>
        </div>

        <form id="details-form" class="space-y-4">

            <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 mb-6">
                <div class="text-sm text-indigo-800 font-medium mb-1">Available Window</div>
                <div id="time-display" class="text-lg font-bold text-indigo-600">Loading...</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-slate-700">Start Time</label>
                    <input type="time" id="event-start-time"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm outline-none shadow-sm text-slate-700">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-slate-700">End Time</label>
                    <input type="time" id="event-end-time"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm outline-none shadow-sm text-slate-700">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-medium text-slate-700">Event Title</label>
                <input type="text" id="event-title" value="Study Session (AllocateMinus)"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm outline-none shadow-sm">
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-medium text-slate-700">Description</label>
                <textarea id="event-desc" rows="2"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm outline-none shadow-sm resize-none">Generated by AllocateMinus</textarea>
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-medium text-slate-700">Invitees (comma-separated emails)</label>
                <input type="text" id="event-guests" placeholder="friend1@example.com, friend2@gmail.com"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm outline-none shadow-sm">
            </div>

            <div class="pt-4">
                <button type="button" id="schedule-btn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 flex justify-center items-center">
                    Continue to Google Calendar
                    <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                </button>
            </div>

        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const startIso = params.get('start');
            const endIso = params.get('end');

            if (!startIso || !endIso) {
                document.getElementById('time-display').textContent = 'Invalid time selection. Please go back and select a time.';
                document.getElementById('schedule-btn').disabled = true;
                return;
            }

            // Display formatting
            const startDate = new Date(startIso);
            const endDate = new Date(endIso);
            const displayStr = startDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }) + ' • ' +
                startDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' - ' +
                endDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            document.getElementById('time-display').textContent = displayStr;

            // Formatter for HTML time inputs to pad with zeros
            const formatTimeInput = (dateObj) => {
                const h = dateObj.getHours().toString().padStart(2, '0');
                const m = dateObj.getMinutes().toString().padStart(2, '0');
                return `${h}:${m}`;
            };

            // Set default time inputs to match the full slot window boundaries
            const startTimeInput = document.getElementById('event-start-time');
            const endTimeInput = document.getElementById('event-end-time');

            startTimeInput.value = formatTimeInput(startDate);
            endTimeInput.value = formatTimeInput(endDate);

            document.getElementById('schedule-btn').addEventListener('click', () => {
                const title = encodeURIComponent(document.getElementById('event-title').value || 'Study Session');
                const desc = encodeURIComponent(document.getElementById('event-desc').value || '');

                const guestsRaw = document.getElementById('event-guests').value;
                const guestsArr = guestsRaw.split(',').map(s => s.trim()).filter(s => s);
                const guestsStr = encodeURIComponent(guestsArr.join(','));

                // User's custom selected times
                const selectedStartTime = startTimeInput.value; // "HH:MM"
                const selectedEndTime = endTimeInput.value;   // "HH:MM"

                // Create full Date objects using the original slot's date mapping combined with user's selected time
                const userStartObj = new Date(startDate);
                const [startH, startM] = selectedStartTime.split(':');
                userStartObj.setHours(parseInt(startH, 10), parseInt(startM, 10), 0, 0);

                const userEndObj = new Date(endDate);
                const [endH, endM] = selectedEndTime.split(':');
                userEndObj.setHours(parseInt(endH, 10), parseInt(endM, 10), 0, 0);

                // Basic validation: Cannot select backwards time
                if (userStartObj >= userEndObj) {
                    alert('Start time must be before end time.');
                    return;
                }

                // Strictly enforce boundaries
                if (userStartObj < startDate || userEndObj > endDate) {
                    alert('Selected times must be within the available window.');
                    return;
                }

                // Build ISO string in local time, then strip down for Google Calendar
                // To avoid timezone shift issues from standard isoformat, construct string manually in local time coordinates
                const formatForGCal = (dateObj) => {
                    const YYYY = dateObj.getFullYear();
                    const MM = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                    const DD = dateObj.getDate().toString().padStart(2, '0');
                    const HH = dateObj.getHours().toString().padStart(2, '0');
                    const MIN = dateObj.getMinutes().toString().padStart(2, '0');
                    const SS = '00';
                    return `${YYYY}${MM}${DD}T${HH}${MIN}${SS}`;
                };

                const gStart = formatForGCal(userStartObj);
                const gEnd = formatForGCal(userEndObj);

                let url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${gStart}/${gEnd}&details=${desc}`;

                if (guestsStr) {
                    url += `&add=${guestsStr}`;
                }

                window.location.href = url; // Redirects the current page
            });
        });
    </script>
    <style>
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-down {
            animation: fadeInDown 0.5s ease-out forwards;
        }
    </style>
</body>

</html>
